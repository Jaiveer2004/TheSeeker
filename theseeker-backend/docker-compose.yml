version: '3.8'

services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: seeker-postgres
    environment:
      POSTGRES_DB: seeker
      POSTGRES_USER: seeker
      POSTGRES_PASSWORD: seeker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seeker -d seeker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

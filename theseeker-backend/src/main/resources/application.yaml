spring:
  ai:
    openai:
      base-url: https://openrouter.ai/api
      api-key: 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
      chat:
        options:
          model: x-ai/grok-code-fast-1

  application:
    name: TheSeeker
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/seeker}
    username: ${SPRING_DATASOURCE_USERNAME:seeker}
    password: ${SPRING_DATASOURCE_PASSWORD:seeker}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:2}

app:
  db:
    seed: true
  lucene:
    index-path: ${SEEKER_LUCENE_INDEX_PATH:my-search-index}
  scheduler:
    failed-search-cron: ${SEEKER_FAILED_SEARCH_CRON:0 */10 * * * *}
